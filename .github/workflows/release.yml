name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      NODE_BUNDLE_VERSION: v22.16.0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Build release zip
        run: |
          mkdir -p /tmp/pkg/truth-or-dare-2
          cp -r server.js package.json package-lock.json \
                start.bat start.sh README.md data lib public node_modules \
                /tmp/pkg/truth-or-dare-2/

      - name: Bundle portable Node.js binaries
        run: |
          TMPDIR_NODE=$(mktemp -d)
          STAGE=/tmp/pkg/truth-or-dare-2
          VER=$NODE_BUNDLE_VERSION

          echo "Downloading node.exe (Windows x64)..."
          curl -fsSL "https://nodejs.org/dist/${VER}/node-${VER}-win-x64.zip" \
            -o "$TMPDIR_NODE/node-win.zip"
          unzip -j -q "$TMPDIR_NODE/node-win.zip" \
            "node-${VER}-win-x64/node.exe" -d "$STAGE/"

          echo "Downloading node-arm64 (macOS Apple Silicon)..."
          curl -fsSL "https://nodejs.org/dist/${VER}/node-${VER}-darwin-arm64.tar.gz" \
            | tar -xzf - -C "$TMPDIR_NODE"
          cp "$TMPDIR_NODE/node-${VER}-darwin-arm64/bin/node" "$STAGE/node-arm64"

          echo "Downloading node-x64 (macOS Intel)..."
          curl -fsSL "https://nodejs.org/dist/${VER}/node-${VER}-darwin-x64.tar.gz" \
            | tar -xzf - -C "$TMPDIR_NODE"
          cp "$TMPDIR_NODE/node-${VER}-darwin-x64/bin/node" "$STAGE/node-x64"

          rm -rf "$TMPDIR_NODE"

      - name: Zip
        run: |
          cd /tmp/pkg && zip -qr truth-or-dare-2.zip truth-or-dare-2/
          echo "ZIP_SIZE=$(du -sh /tmp/pkg/truth-or-dare-2.zip | cut -f1)" >> $GITHUB_ENV

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: |
            ## Download

            Download **truth-or-dare-2.zip**, unzip it, then:

            - **Windows:** double-click `start.bat`
            - **Mac / Linux:** run `./start.sh`

            No installation needed — Node.js ${{ env.NODE_BUNDLE_VERSION }} is bundled inside the zip.
        run: |
          echo "$RELEASE_NOTES" > /tmp/notes.md
          gh release create "${{ github.ref_name }}" \
            /tmp/pkg/truth-or-dare-2.zip \
            --title "Truth or Dare 2.0 ${{ github.ref_name }}" \
            --notes-file /tmp/notes.md
